<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drekee Search</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #09090b;
    --bg-glow: #1a2235;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.06);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 50% -20%, var(--bg-glow) 0%, var(--bg-dark) 70%);
    background-color: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex;
    justify-content: flex-end;
    padding: 24px 32px;
  }

  .icon-btn {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    cursor: pointer;
    color: var(--text-muted);
    padding: 10px;
    border-radius: 50%;
    transition: all 0.3s ease;
    display: flex; 
    align-items: center;
    justify-content: center;
  }

  .icon-btn:hover { 
    color: var(--text-main); 
    background: var(--glass-hover);
    transform: scale(1.05);
  }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px 10vh;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 48px;
    user-select: none;
    animation: fadeDown 0.8s ease-out;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    filter: drop-shadow(0 0 24px rgba(59, 130, 246, 0.4));
  }

  .logo-text {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .search-wrap {
    width: 100%;
    max-width: 740px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    display: flex;
    align-items: center;
    padding: 10px 10px 10px 24px;
    gap: 16px;
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    animation: fadeUp 0.8s ease-out 0.2s both;
  }
  
  .search-wrap:focus-within {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5), 0 0 0 4px rgba(59, 130, 246, 0.15);
    transform: translateY(-2px);
  }

  .circle-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .circle-btn:hover { 
    color: var(--text-main);
    background: var(--glass-hover);
  }

  .search-wrap textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 16px;
    font-weight: 500;
    resize: none;
    line-height: 24px;
    height: 24px;
    font-family: inherit;
    overflow: hidden;
  }
  
  .search-wrap textarea::placeholder { 
    color: var(--text-muted); 
    font-weight: 400;
  }
  
  .btn-ask {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 24px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .btn-ask:hover { 
    background: #e2e8f0; 
    transform: scale(1.03);
    box-shadow: 0 8px 16px rgba(255,255,255,0.1);
  }

  .ask-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .logo-text { font-size: 40px; }
    .search-wrap { 
      flex-wrap: wrap; 
      padding: 16px; 
      border-radius: 24px;
    }
    .search-wrap textarea { 
      min-width: 100%; 
      order: -1; 
      margin-bottom: 12px; 
      height: 48px;
    }
    .btn-ask { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <button class="icon-btn" title="Configurações">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</nav>

<main class="hero">

  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 80 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 4 L74 18 L74 46 C74 64 58 78 40 84 C22 78 6 64 6 46 L6 18 Z" fill="url(#shieldGrad)"/>
      <defs>
        <linearGradient id="shieldGrad" x1="40" y1="4" x2="40" y2="84" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#60a5fa"/>
          <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
      </defs>
      <path d="M40 12 L68 24 L68 46 C68 61 54 73 40 78 C26 73 12 61 12 46 L12 24 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="40" y="58" text-anchor="middle" font-size="38" font-weight="900" font-family="'Inter', sans-serif" fill="white" letter-spacing="-1">D</text>
    </svg>
    <h1 class="logo-text">Drekee Search</h1>
  </div>

  <div class="search-wrap">
    <button class="circle-btn" title="Adicionar arquivo">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    
    <textarea placeholder="Pergunte o que quiser..." rows="1"></textarea>
    
    <button class="circle-btn" title="Pesquisa por voz">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    
    <button class="btn-ask">
      <span class="ask-icon">
        <svg width="14" height="14" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </span>
      Perguntar
    </button>
  </div>

</main>

</body>
</html>
